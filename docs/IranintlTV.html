<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8" />

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            background: radial-gradient(circle at top, #1b1f2a, #0b0f17);
            display: flex;
            justify-content: center;
            padding: 28px;
            color: #e6e6e6;
        }

        .container {
            width: 100%;
            max-width: 720px;
        }

        /* Glass card */
        .bar {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            padding: 14px;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        }

        input {
            flex: 1;
            padding: 11px 12px;
            font-size: 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            background: rgba(0, 0, 0, 0.25);
            color: #eaeaea;
            outline: none;
            transition: 0.2s;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.45);
        }

        input:focus {
            border-color: rgba(120, 160, 255, 0.8);
            box-shadow: 0 0 0 3px rgba(120, 160, 255, 0.15);
        }

        button {
            padding: 11px 16px;
            font-size: 14px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #4f7cff, #2f5fff);
            transition: 0.2s ease;
            box-shadow: 0 6px 18px rgba(47, 95, 255, 0.25);
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 24px rgba(47, 95, 255, 0.35);
        }

        button:active {
            transform: scale(0.98);
        }

        textarea {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Times New Roman", monospace;
            font-size: 15px;
            resize: none;
            outline: none;

            width: 100%;
            height: calc(100dvh - 120px);

            padding: 16px;
            border-radius: 14px;

            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #e6e6e6;

            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.45);

            display: none;

            line-height: 1.5;
        }

        textarea::selection {
            background: rgba(120, 160, 255, 0.35);
        }
    </style>
</head>

        function b64urlParse(str) {
            str = str.replace(/-/g, "+").replace(/_/g, "/");
            return CryptoJS.enc.Base64.parse(str);
        }

        function decryptToken(token, password) {

            try {

                const dot = token.indexOf(".");
                if (dot < 0) return "";

                const payload = token.slice(dot + 1);

                const packed = b64urlParse(payload);

                const salt = CryptoJS.lib.WordArray.create(packed.words.slice(0, 4), 16);
                const iv = CryptoJS.lib.WordArray.create(packed.words.slice(4, 8), 16);

                const cipherBytes = packed.sigBytes - 64;
                const cipher = CryptoJS.lib.WordArray.create(
                    packed.words.slice(8, 8 + cipherBytes / 4),
                    cipherBytes
                );

                const mac = CryptoJS.lib.WordArray.create(
                    packed.words.slice(8 + cipherBytes / 4),
                    32
                );

                const key = CryptoJS.PBKDF2(password, salt, {
                    keySize: 512 / 32,
                    iterations: 1e5
                });

                const aesKey = CryptoJS.lib.WordArray.create(key.words.slice(0, 8));
                const macKey = CryptoJS.lib.WordArray.create(key.words.slice(8, 16));

                const check = CryptoJS.HmacSHA256(
                    salt.clone().concat(iv).concat(cipher),
                    macKey
                );

                if (check.toString() != mac.toString())
                    return "Wrong password!";

                const dec = CryptoJS.AES.decrypt(
                    { ciphertext: cipher },
                    aesKey,
                    { iv: iv }
                );

                return dec.toString(CryptoJS.enc.Utf8);

            } catch {
                return "Wrong password!";
            }
        }

        const input = document.querySelector('input');
        const button = document.querySelector('button');
        const textarea = document.querySelector('textarea');
        const token = textarea.value.trim();

        button.onclick = async () => {
            textarea.value = 'Please wait...';
            textarea.style.display = 'block';
            setTimeout(() => {
                textarea.value = decryptToken(token, input.value);
            }, 40);
        };
